name: focuschainlabs_mobile
description: Mr Rex sales companion by FocusChain Labs.
publish_to: "none"
version: 0.3.0+4

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  get_it: ^8.0.3
  intl: ^0.20.2
  # UI / UX
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  curved_navigation_bar: ^1.0.6
  # Local persistence (demo mode + cached session).
  shared_preferences: ^2.3.2
  # Networking + integrations
  http: ^1.2.2
  webview_flutter: ^4.10.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.1.0
  speech_to_text: ^7.0.0
  supabase_flutter: ^2.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env from secrets
        run: |
          cat > .env <<'EOF'
          DEMO_DIRECT_INTEGRATIONS=true
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=gemini-2.5-flash
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_CRM_REPO=savinpadencherry/Focuschainlabs_Leads_Agent
          GITHUB_CRM_PATH=data/crm/contacts.json
          GITHUB_CRM_BRANCH=main
          CRM_WEB_URL=${{ secrets.CRM_WEB_URL }}
          TRELLO_KEY=${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN=${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID=${{ secrets.TRELLO_LIST_ID }}
          TRELLO_BOARD_URL=${{ secrets.TRELLO_BOARD_URL }}
          EOF
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-web:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env from secrets
        run: |
          cat > .env <<'EOF'
          DEMO_DIRECT_INTEGRATIONS=true
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=gemini-2.5-flash
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_CRM_REPO=savinpadencherry/Focuschainlabs_Leads_Agent
          GITHUB_CRM_PATH=data/crm/contacts.json
          GITHUB_CRM_BRANCH=main
          CRM_WEB_URL=${{ secrets.CRM_WEB_URL }}
          TRELLO_KEY=${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN=${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID=${{ secrets.TRELLO_LIST_ID }}
          TRELLO_BOARD_URL=${{ secrets.TRELLO_BOARD_URL }}
          EOF
      - run: flutter pub get
      - run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  build-android:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Create .env from secrets
        run: |
          cat > .env <<'EOF'
          DEMO_DIRECT_INTEGRATIONS=true
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL=gemini-2.5-flash
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_CRM_REPO=savinpadencherry/Focuschainlabs_Leads_Agent
          GITHUB_CRM_PATH=data/crm/contacts.json
          GITHUB_CRM_BRANCH=main
          CRM_WEB_URL=${{ secrets.CRM_WEB_URL }}
          TRELLO_KEY=${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN=${{ secrets.TRELLO_TOKEN }}
          TRELLO_LIST_ID=${{ secrets.TRELLO_LIST_ID }}
          TRELLO_BOARD_URL=${{ secrets.TRELLO_BOARD_URL }}
          EOF
      - run: flutter pub get
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
